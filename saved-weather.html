<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Weather | Bohol Rides</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .saved-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 10px;
    }

    .saved-card {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: white;
      border-radius: 14px;
      padding: 22px 24px;
      width: 220px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      position: relative;
    }

    .saved-card-city {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 2px;
    }

    .saved-card-country {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .saved-card-temp {
      font-size: 36px;
      font-weight: bold;
      line-height: 1;
    }

    .saved-card-desc {
      font-size: 13px;
      text-transform: capitalize;
      opacity: 0.85;
      margin: 6px 0 12px;
    }

    .saved-card-icon {
      width: 52px;
      height: 52px;
      position: absolute;
      top: 18px;
      right: 18px;
    }

    .saved-card-details {
      font-size: 12px;
      opacity: 0.8;
      line-height: 1.8;
    }

    .saved-card-date {
      font-size: 11px;
      opacity: 0.55;
      margin-top: 12px;
    }

    .delete-btn {
      margin-top: 14px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }

    .delete-btn:hover {
      background: rgba(255,80,80,0.4);
      border-color: rgba(255,80,80,0.6);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }

    .empty-state .empty-icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 15px;
      margin-bottom: 20px;
    }

    /* Clear all button */
    .clear-all-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .clear-all-btn {
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
    }

    .clear-all-btn:hover { background: #a93226; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #1a6e3c; }
    .toast.deleted { background: #c0392b; }

    /* Dark mode */
    body.dark .empty-state { color: #aaa; }
  </style>
</head>
<body>
  <header class="headers">
    <h1>Bohol Rides</h1>
  </header>

  <section class="page-content">
    <div class="dashboard">

      <aside class="sidebar">
        <h3>Navigation</h3>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="weather.html">Weather</a></li>
          <li><a href="saved-weather.html" class="active">⭐ Saved Weather</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
      </aside>

      <main class="dashboard-content">
        <h2>⭐ Saved Weather</h2>
        <p style="color:#666; margin-bottom:20px; font-size:14px;">
          Cities you have saved for quick weather reference.
        </p>

        <div id="savedContent"></div>
      </main>

    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }

    function showToast(message, type) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast " + type + " show";
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function deleteCity(cityName) {
      let saved = JSON.parse(localStorage.getItem("savedWeather") || "[]");
      saved = saved.filter(item => item.city.toLowerCase() !== cityName.toLowerCase());
      localStorage.setItem("savedWeather", JSON.stringify(saved));
      showToast("🗑️ " + cityName + " removed.", "deleted");
      renderSaved(); // re-render the list
    }

    function clearAll() {
      if (!confirm("Remove all saved cities?")) return;
      localStorage.removeItem("savedWeather");
      showToast("🗑️ All saved cities cleared.", "deleted");
      renderSaved();
    }

    function renderSaved() {
      const container = document.getElementById("savedContent");
      const saved = JSON.parse(localStorage.getItem("savedWeather") || "[]");

      if (saved.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🌤️</div>
            <p>No saved cities yet.</p>
            <a href="weather.html" class="cta-button">Search Weather</a>
          </div>
        `;
        return;
      }

      // Clear all button
      let html = `
        <div class="clear-all-row">
          <button class="clear-all-btn" onclick="clearAll()">🗑️ Clear All</button>
        </div>
        <div class="saved-grid">
      `;

      saved.forEach(item => {
        html += `
          <div class="saved-card">
            <img
              class="saved-card-icon"
              src="https://openweathermap.org/img/wn/${item.icon}@2x.png"
              alt="${item.description}"
            />
            <div class="saved-card-city">${item.city}</div>
            <div class="saved-card-country">${item.country}</div>
            <div class="saved-card-temp">${item.temp}°C</div>
            <div class="saved-card-desc">${item.description}</div>
            <div class="saved-card-details">
              💧 Humidity: ${item.humidity}%<br>
              💨 Wind: ${item.windSpeed} km/h<br>
              👁️ Visibility: ${item.visibility} km<br>
              🌡️ Feels like: ${item.feelsLike}°C
            </div>
            <div class="saved-card-date">Saved: ${item.savedAt}</div>
            <button class="delete-btn" onclick="deleteCity('${item.city}')">🗑️ Remove</button>
          </div>
        `;
      });

      html += `</div>`;
      container.innerHTML = html;
    }

    // Render on page load
    renderSaved();
  </script>
</body>
</html>
