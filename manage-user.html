<main class="dashboard-content">

<table border="1" width="100%" id="userTable">

<h3 style="margin-top:40px;">Add User</h3>

<form id="addUserForm">

<label>Name</label>
<input type="text" id="newName" required>

<label>Email</label>
<input type="email" id="newEmail" required>

<label>Role</label>

</form>
